<div class="flex flex-col h-full bg-white">
  
  <!-- Form Fields -->
  <div class="px-6 pt-6 pb-4 space-y-4 border-b border-slate-200">
    
    <!-- To -->
    <div class="flex items-center gap-4">
      <label class="w-16 text-sm font-bold text-slate-500 uppercase tracking-wider">To:</label>
      <div class="flex-1">
        <input pInputText type="email" [ngModel]="to" (ngModelChange)="toChange.emit($event)" class="w-full text-sm font-medium border-transparent hover:border-slate-300 focus:border-[#F16D22] focus:ring-[#F16D22] rounded-lg transition-colors px-3 py-2 bg-slate-50" placeholder="customer@example.com">
      </div>
    </div>

    <!-- Template -->
    <div class="flex items-center gap-4">
      <label class="w-16 text-sm font-bold text-slate-500 uppercase tracking-wider">Template:</label>
      <div class="flex-1 flex gap-2">
        <p-select [options]="templates()" [ngModel]="selectedTemplate()" (ngModelChange)="onTemplateChange($event)" optionLabel="name" placeholder="Select a template..." styleClass="w-full text-sm border-transparent hover:border-slate-300 focus:border-[#F16D22] bg-slate-50 rounded-lg"></p-select>
        <button pButton icon="pi pi-save" class="p-button-outlined p-button-secondary" pTooltip="Save Template" (click)="newTemplateName = selectedTemplate()?.name || ''; showSaveDialog = true"></button>
      </div>
    </div>

    <!-- Subject -->
    <div class="flex items-center gap-4">
      <label class="w-16 text-sm font-bold text-slate-500 uppercase tracking-wider">Subject:</label>
      <div class="flex-1">
        <input pInputText type="text" [ngModel]="subject" (ngModelChange)="subjectChange.emit($event)" class="w-full text-sm font-bold text-slate-900 border-transparent hover:border-slate-300 focus:border-[#F16D22] focus:ring-[#F16D22] rounded-lg transition-colors px-3 py-2 bg-slate-50" placeholder="Email subject">
      </div>
    </div>
  </div>

  <!-- Variables Row (Optional) -->
  <div class="px-6 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
    <div class="flex items-center gap-2 text-xs" ngNonBindable>
      <span class="font-bold text-slate-500 uppercase tracking-wider mr-2">Variables:</span>
      <span class="px-2 py-1 bg-white border border-slate-200 rounded text-slate-600 font-mono cursor-copy hover:bg-slate-100 transition-colors">{{customer.name}}</span>
      <span class="px-2 py-1 bg-white border border-slate-200 rounded text-slate-600 font-mono cursor-copy hover:bg-slate-100 transition-colors">{{order.id}}</span>
      <span class="px-2 py-1 bg-white border border-slate-200 rounded text-slate-600 font-mono cursor-copy hover:bg-slate-100 transition-colors">{{return.amount}}</span>
    </div>
    
    <button class="text-xs font-bold text-[#F16D22] hover:underline flex items-center gap-1">
      <i class="pi pi-sparkles"></i> Ask AI to rewrite
    </button>
  </div>

  <!-- Editor -->
  <div class="flex-1 relative">
    <p-editor [ngModel]="body" (ngModelChange)="bodyChange.emit($event)" [style]="{'height': '100%', 'border': 'none', 'padding': '1.5rem'}" styleClass="h-full border-0 focus-within:ring-2 focus-within:ring-[#F16D22] transition-shadow"></p-editor>
  </div>

  <!-- Footer Actions -->
  <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center shrink-0">
    <button class="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded-lg text-sm transition-colors flex items-center gap-2">
      <i class="pi pi-eye"></i> Preview
    </button>
    
    <div class="flex gap-2">
      <button class="px-6 py-2 bg-[#F16D22] text-white font-bold hover:bg-[#d65715] rounded-lg text-sm shadow-sm transition-colors flex items-center gap-2" (click)="onSend()">
        <i class="pi pi-send"></i> Send Email
      </button>
    </div>
  </div>

  <p-dialog [(visible)]="showSaveDialog" [modal]="true" header="Save Template" [style]="{width: '400px'}">
    <div class="py-4 space-y-4">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Template Name</label>
        <input pInputText type="text" [(ngModel)]="newTemplateName" class="w-full" placeholder="e.g. Follow Up Email" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Cancel" class="p-button-text" (click)="showSaveDialog = false"></button>
      <button pButton label="Save" [disabled]="!newTemplateName" (click)="saveTemplate()"></button>
    </ng-template>
  </p-dialog>
</div>
