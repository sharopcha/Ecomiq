<p-dialog 
  [visible]="visible" 
  (visibleChange)="hide()" 
  [modal]="true" 
  header="Notify Customer"
  [style]="{ width: '600px' }" 
  [draggable]="false"
  [resizable]="false"
  styleClass="p-0"
>
  <div class="flex flex-col gap-4 p-2">
    <!-- Channel Tabs -->
    <div class="flex border-b border-slate-200">
      <button 
        (click)="setChannel('email')" 
        [class]="channel() === 'email' ? 'px-4 py-3 text-sm font-bold text-[#F16D22] border-b-2 border-[#F16D22] flex items-center gap-2' : 'px-4 py-3 text-sm font-semibold text-slate-500 hover:text-slate-700 border-b-2 border-transparent flex items-center gap-2'">
        <i class="pi pi-envelope"></i> Email
      </button>
      <button 
        (click)="setChannel('sms')" 
        [class]="channel() === 'sms' ? 'px-4 py-3 text-sm font-bold text-[#F16D22] border-b-2 border-[#F16D22] flex items-center gap-2' : 'px-4 py-3 text-sm font-semibold text-slate-500 hover:text-slate-700 border-b-2 border-transparent flex items-center gap-2'">
        <i class="pi pi-comment"></i> SMS
      </button>
      <button 
        (click)="setChannel('whatsapp')" 
        [class]="channel() === 'whatsapp' ? 'px-4 py-3 text-sm font-bold text-[#F16D22] border-b-2 border-[#F16D22] flex items-center gap-2' : 'px-4 py-3 text-sm font-semibold text-slate-500 hover:text-slate-700 border-b-2 border-transparent flex items-center gap-2'">
        <i class="pi pi-whatsapp"></i> WhatsApp
      </button>
    </div>

    <!-- Email Content -->
    <div *ngIf="channel() === 'email'" class="flex flex-col gap-4 animate-fadein">
      <div class="flex flex-col gap-2">
        <label class="text-sm font-bold text-slate-700">To</label>
        <div class="h-10 px-3 bg-slate-50 border border-slate-200 rounded-lg flex items-center text-sm text-slate-700">
          {{ customerEmail || 'customer@example.com' }}
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-bold text-slate-700">Template</label>
        <p-select 
          [options]="templates()" 
          [ngModel]="selectedTemplate()" 
          (ngModelChange)="selectedTemplate.set($event); onTemplateChange($event)"
          optionLabel="name" 
          placeholder="Select a template or write custom"
          styleClass="w-full h-10 border-slate-300 rounded-lg text-sm flex items-center"
          appendTo="body">
        </p-select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-bold text-slate-700">Subject</label>
        <input pInputText type="text" [ngModel]="subject()" (ngModelChange)="subject.set($event)" class="w-full h-10 text-sm border-slate-300 rounded-lg focus:border-[#F16D22] focus:ring-[#F16D22]">
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-bold text-slate-700">Message</label>
        <!-- Mock of a rich text editor -->
        <div class="border border-slate-300 rounded-lg overflow-hidden focus-within:border-[#F16D22] focus-within:ring-1 focus-within:ring-[#F16D22]">
          <div class="bg-slate-50 border-b border-slate-200 p-2 flex gap-2">
            <button class="w-8 h-8 rounded text-slate-600 hover:bg-slate-200 flex items-center justify-center"><i class="pi pi-bold"></i></button>
            <button class="w-8 h-8 rounded text-slate-600 hover:bg-slate-200 flex items-center justify-center"><i class="pi pi-italic"></i></button>
            <button class="w-8 h-8 rounded text-slate-600 hover:bg-slate-200 flex items-center justify-center"><i class="pi pi-link"></i></button>
          </div>
          <textarea pTextarea [ngModel]="body()" (ngModelChange)="body.set($event)" rows="6" class="w-full border-none p-3 text-sm resize-none focus:ring-0"></textarea>
        </div>
      </div>
    </div>

    <!-- SMS / WhatsApp Content -->
    <div *ngIf="channel() !== 'email'" class="flex flex-col gap-4 animate-fadein">
      <div class="bg-blue-50 border border-blue-200 text-blue-800 text-sm p-3 rounded-lg flex items-start gap-3">
        <i class="pi pi-info-circle mt-0.5"></i>
        <div>
          <span class="font-bold">Messaging Service Required</span>
          <p class="text-xs text-blue-600 mt-1">This workspace is currently not connected to Twilio or WhatsApp Business. Messages sent here will be logged but not delivered.</p>
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-bold text-slate-700">Message</label>
        <textarea pTextarea [ngModel]="phoneMessage()" (ngModelChange)="phoneMessage.set($event)" rows="4" class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:border-[#F16D22] focus:ring-[#F16D22] resize-none"></textarea>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2 w-full pt-4 border-t border-slate-100">
      <button 
        class="px-4 py-2 bg-white text-slate-700 hover:bg-slate-50 border border-slate-300 text-sm font-bold rounded-lg shadow-sm transition-colors"
        (click)="hide()"
        [disabled]="submitting()">
        Cancel
      </button>
      <button 
        class="px-4 py-2 bg-[#F16D22] text-white hover:bg-[#d65715] disabled:bg-slate-300 disabled:cursor-not-allowed text-sm font-bold rounded-lg shadow-sm transition-colors flex items-center gap-2"
        (click)="send()"
        [disabled]="submitting() || (channel() === 'email' && !body()) || (channel() !== 'email' && !phoneMessage())">
        <i *ngIf="submitting()" class="pi pi-spin pi-spinner text-xs"></i>
        Send {{ channel() | titlecase }}
      </button>
    </div>
  </ng-template>
</p-dialog>
