<div class="p-6 max-w-[1600px] mx-auto text-slate-700">

  <!-- PAGE HEADER -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
    <div class="flex items-center gap-3">
      <h1 class="text-xl font-bold tracking-tight text-slate-900">
        Return & Refund
      </h1>
      <div class="flex items-center gap-1">
        <button class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-650 transition-colors cursor-pointer">
          <i class="pi pi-ellipsis-h text-sm"></i>
        </button>
        <button class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-650 transition-colors cursor-pointer">
          <i class="pi pi-download text-sm"></i>
        </button>
      </div>
    </div>
    <button class="px-4 py-2 bg-[#F16D22] text-white hover:bg-[#d65715] text-xs font-bold rounded-lg shadow-sm flex items-center gap-2 transition-all cursor-pointer">
      <i class="pi pi-plus text-xs"></i>
      <span>Create Request</span>
    </button>
  </div>

  <!-- FILTER BAR -->
  <div class="p-4 rounded-xl bg-white border border-slate-200 flex flex-col gap-4 mb-6 shadow-sm">
    <!-- Top row: Tabs -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-100 pb-3">
      <!-- Tabs (Saved Views) -->
      <div class="flex items-center gap-1">
        <button 
          (click)="onTabChange('all')" 
          [class]="activeTab() === 'all'
            ? 'px-3 py-1.5 text-xs font-bold border-b-2 border-[#F16D22] text-slate-900 transition-all flex items-center gap-1.5 cursor-pointer'
            : 'px-3 py-1.5 text-xs font-medium text-slate-500 hover:text-slate-800 transition-all flex items-center gap-1.5 cursor-pointer'"
        >
          <i class="pi pi-list text-xs"></i>
          <span>All Requests</span>
        </button>
        <button 
          (click)="onTabChange('pending')" 
          [class]="activeTab() === 'pending'
            ? 'px-3 py-1.5 text-xs font-bold border-b-2 border-[#F16D22] text-slate-900 transition-all flex items-center gap-1.5 cursor-pointer'
            : 'px-3 py-1.5 text-xs font-medium text-slate-500 hover:text-slate-800 transition-all flex items-center gap-1.5 cursor-pointer'"
        >
          <i class="pi pi-clock text-xs"></i>
          <span>Pending Approval</span>
        </button>
        <button 
          (click)="onTabChange('approved')" 
          [class]="activeTab() === 'approved'
            ? 'px-3 py-1.5 text-xs font-bold border-b-2 border-[#F16D22] text-slate-900 transition-all flex items-center gap-1.5 cursor-pointer'
            : 'px-3 py-1.5 text-xs font-medium text-slate-500 hover:text-slate-800 transition-all flex items-center gap-1.5 cursor-pointer'"
        >
          <i class="pi pi-check-circle text-xs"></i>
          <span>Approved</span>
        </button>
        <button 
          (click)="onTabChange('rejected')" 
          [class]="activeTab() === 'rejected'
            ? 'px-3 py-1.5 text-xs font-bold border-b-2 border-[#F16D22] text-slate-900 transition-all flex items-center gap-1.5 cursor-pointer'
            : 'px-3 py-1.5 text-xs font-medium text-slate-500 hover:text-slate-800 transition-all flex items-center gap-1.5 cursor-pointer'"
        >
          <i class="pi pi-times-circle text-xs"></i>
          <span>Rejected</span>
        </button>
        <button 
          class="px-3 py-1.5 text-xs font-semibold text-slate-400 hover:text-slate-600 transition-all flex items-center gap-1 cursor-pointer"
        >
          <i class="pi pi-plus text-[10px]"></i>
          <span>View</span>
        </button>
      </div>
      <!-- Right settings -->
      <div class="flex items-center gap-2">
        <button class="px-3 py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-800 transition-all flex items-center gap-1.5 cursor-pointer">
          <i class="pi pi-cog text-xs"></i>
          <span>View Settings</span>
          <i class="pi pi-chevron-down text-[9px]"></i>
        </button>
      </div>
    </div>

    <!-- Bottom row: Search & Dropdowns -->
    <div class="flex flex-col sm:flex-row items-center gap-3">
      <!-- Search Input -->
      <div class="relative w-full sm:w-60">
        <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-450 text-xs"></i>
        <input 
          type="text" 
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
          placeholder="Search"
          class="w-full h-8 pl-8 pr-4 bg-slate-50 text-slate-700 rounded-full text-xs border border-slate-200 focus:outline-none focus:border-[#F16D22]/60 placeholder-slate-400 transition-all"
        />
      </div>
      
      <!-- Filters -->
      <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
        <!-- Date Range Pill -->
        <p-popover #dp>
          <div class="p-2 w-64">
            <p-datepicker [ngModel]="dateRange()" (ngModelChange)="dateRange.set($event)" selectionMode="range" [inline]="true" styleClass="w-full"></p-datepicker>
            <div class="flex justify-end mt-2">
              <button class="text-xs font-bold text-[#F16D22]" (click)="dp.hide()">Apply</button>
            </div>
          </div>
        </p-popover>
        <button (click)="dp.toggle($event)" class="h-8 px-4 bg-[#0D0D1C] hover:bg-[#1a1a2e] text-white rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all shadow-sm cursor-pointer border-0">
          <span>Date</span>
          <i class="pi pi-chevron-down text-[8px] opacity-80"></i>
        </button>

        <!-- Shipping Status Select -->
        <p-select 
          [options]="shippingOptions" 
          [ngModel]="shippingFilter()" 
          (ngModelChange)="shippingFilter.set($event)" 
          optionLabel="label" 
          optionValue="value" 
          placeholder="Shipping Status" 
          styleClass="orders-pill-select"
        ></p-select>

        <!-- Hide button -->
        <button class="h-8 px-4 bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-650 rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all cursor-pointer">
          <span>Hide</span>
        </button>
      </div>

      <!-- Manage Table -->
      <div class="sm:ml-auto">
        <button class="h-8 px-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-650 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all shadow-sm cursor-pointer">
          <i class="pi pi-table text-xs text-slate-455"></i>
          <span>Manage Table</span>
        </button>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm">
    <p-table [value]="filteredReturns()" [loading]="loading()" dataKey="id" styleClass="p-datatable-sm text-xs" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10, 20, 50]">
      <ng-template pTemplate="header">
        <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 font-semibold text-[11px] tracking-wide uppercase">
          <th class="py-3.5 px-4 text-left">Request ID <i class="pi pi-sort text-[9px] ml-1 opacity-70"></i></th>
          <th class="py-3.5 px-4 text-left">Status <i class="pi pi-sort text-[9px] ml-1 opacity-70"></i></th>
          <th class="py-3.5 px-4 text-left">Request Date <i class="pi pi-sort text-[9px] ml-1 opacity-70"></i></th>
          <th class="py-3.5 px-4 text-left">Order <i class="pi pi-sort text-[9px] ml-1 opacity-70"></i></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-req>
        <tr class="border-b border-slate-150 hover:bg-slate-50/60 transition-colors text-slate-700 cursor-pointer animate-fadein" (click)="openReturn(req.id)">
          <td class="py-3.5 px-4 font-bold text-slate-900">
            <div class="flex items-center gap-2">
              <span *ngIf="req.status === 'pending_approval'" class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
              <span class="hover:text-[#F16D22] transition-colors">{{ req.display_id }}</span>
            </div>
          </td>
          <td class="py-3.5 px-4">
            <div class="flex items-center gap-2">
              <span [class]="getStatusClass(req.status)">{{ formatStatus(req.status) }}</span>
              <span *ngIf="req.shipping_status !== 'none'" class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border text-slate-650 bg-slate-50 border-slate-200">
                + {{ formatStatus(req.shipping_status) }}
              </span>
            </div>
          </td>
          <td class="py-3.5 px-4 text-slate-600 font-medium">
            {{ req.requested_at | date:'mediumDate' }}
          </td>
          <td class="py-3.5 px-4 font-bold text-slate-900">
            <span class="text-[#F16D22] hover:underline text-xs flex items-center gap-1">
              {{ req.order_id }}
            </span>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="p-8 text-center text-slate-500">
            <div class="flex flex-col items-center gap-3">
              <i class="pi pi-inbox text-4xl text-slate-300"></i>
              <p class="font-medium text-slate-600">No return requests found</p>
              <p class="text-sm">Try adjusting your filters or search query.</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<app-return-detail
  *ngIf="showReturnDrawer()"
  [visible]="showReturnDrawer()"
  (visibleChange)="showReturnDrawer.set($event)"
  [returnId]="activeReturnId() || ''">
</app-return-detail>
